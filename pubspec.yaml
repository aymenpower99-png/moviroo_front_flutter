name: moviroo
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  easy_localization: ^3.0.0
  flutter_sound: ^9.2.13 # replaces record — proper namespace, works with modern AGP
  just_audio: ^0.9.40
  path_provider: ^2.1.3
  permission_handler: ^11.3.1 # needed for mic permission with flutter_sound
  flutter_map: ^7.0.2 # OpenStreetMap tile rendering
  latlong2: ^0.9.1 # LatLng type for flutter_map
  maplibre_gl: ^0.25.0 # MapLibre GL for real map rendering
  mapbox_maps_flutter: ^2.3.0 # Mapbox GL for booking location picker
  socket_io_client: ^2.0.3+1 # WebSocket for live driver tracking
  flutter_secure_storage: ^9.2.2 # JWT token storage
  google_sign_in: ^6.2.1 # Google OAuth
  sign_in_with_apple: ^6.1.0 # Apple Sign-In
  url_launcher: ^6.3.1 # Phone dialer
  http: ^1.2.0 # HTTP client for API calls
  geolocator: ^12.0.0 # GPS location fetching
  firebase_core: ^4.7.0
  app_links: ^6.3.3 # Deep link handling
  lottie: ^3.1.2 # Splash animation
  local_auth: ^2.3.0 # Device biometric (Face ID / Fingerprint / PIN)
  local_auth_android: ^1.0.47
  local_auth_darwin: ^1.4.2
  flutter_stripe: ^11.3.0 # Stripe payment processing
  model_viewer_plus: ^1.10.0 # 3D model viewer for GLB/GLTF files

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo66.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/logo66.jpg"

flutter_native_splash:
  color: "#FFFFFF"
  image: images/ls.png
  fullscreen: true

  android_12:
    color: "#FFFFFF"
    image: images/ls.png

